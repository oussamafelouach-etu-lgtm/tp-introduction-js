<script type="text/javascript">
function degrC(tempF) {
    var tempC= (5/9) * (tempF - 32)
    alert("Une température en Fahrenheit : " + tempF +
          "\nCette température équivaut à " + tempC + " degrés Celsius");

}

degrC(60)
</script>
