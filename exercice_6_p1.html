<script>
   function fibo1(n) {
    if (n == 0) return 0;
    if (n == 1) return 1;

    var a = 0;
    var b = 1;
    var c;

    for (var i = 2; i <= n; i++) {
        c = a + b;
        a = b;
        b = c;
    }

    return c;
}
var n = 7;
console.log("Le terme Fibonacci numéro " + n + " est : " + fibo1(n));
</script>
