<script>
    function fibo2(valeur) {
    var a = 0;
    var b = 1;
    var rang = 1;

    while (b <= valeur) {
        var c = a + b;
        a = b;
        b = c;
        rang++;
    }

    console.log("Valeur :", b);
    console.log("Rang :", rang);
}

var x = 10;
fibo2(x);
</script>
